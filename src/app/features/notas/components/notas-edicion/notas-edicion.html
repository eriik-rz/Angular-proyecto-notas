<div class="container mt-4">
    <div class="card border-warning shadow-sm">
        <div class="card-header bg-warning text-dark">
            <h3 class="mb-0">Editar Nota</h3>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label fw-bold">Título</label>
                <input type="text" [(ngModel)]="nota.titulo" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Contenido</label>
                <textarea [(ngModel)]="nota.contenido" class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Etiqueta</label>
                <select [(ngModel)]="nota.etiqueta_id" class="form-select">
                    @for (e of etiquetas(); track e.id) {
                        <option [value]="e.id">{{ e.nombre }}</option>
                    }
                </select>
            </div>

            <button class="btn btn-warning w-100" (click)="actualizar()">
                <span class="material-symbols-outlined align-middle">save</span> Guardar Cambios
            </button>
        </div>
    </div>
</div>
