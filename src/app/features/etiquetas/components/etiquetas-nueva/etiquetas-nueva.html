<div class="container mt-4">
    <div class="card shadow-sm border-secondary">
        <div class="card-header bg-secondary text-white">
            <h3 class="mb-0">Nueva Categoría</h3>
        </div>
        <div class="card-body">
            <form (submit)="$event.preventDefault()"> <div class="mb-3">
                    <label class="form-label fw-bold">Nombre de la Etiqueta</label>
                    <input type="text" 
                           [formField]="etiquetaForm.nombre" 
                           class="form-control"
                           [class.is-invalid]="etiquetaModel().nombre.trim() === '' && botonGuardarPulsado">
                    <div class="invalid-feedback">El nombre es obligatorio.</div>
                </div>
                
                <button type="button" class="btn btn-secondary" (click)="guardar()">
                    Crear Etiqueta
                </button>
            </form>

            @if(mostrarAlerta) {
                <div class="alert alert-success mt-3 animate__animated animate__fadeIn">
                    Etiqueta creada con éxito.
                </div>
            }
        </div>
    </div>
</div>
